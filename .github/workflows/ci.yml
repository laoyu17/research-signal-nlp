name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: ruff check src tests

      - name: Type check
        run: mypy src

      - name: Test
        run: pytest tests/unit tests/integration tests/e2e

      - name: Metrics regression gate
        run: |
          bash examples/demo_run.sh
          rsnlp check-regression \
            --baseline tests/baseline/cs_metrics_baseline.json \
            --current artifacts/cs_metrics.json
